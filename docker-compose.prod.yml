services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stockflow
      POSTGRES_PASSWORD: stockflow_secure_prod_password
      POSTGRES_DB: stockflow
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://stockflow:stockflow_secure_prod_password@db:5432/stockflow
      ALLOWED_ORIGINS: http://localhost,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api/v1
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data_prod:
