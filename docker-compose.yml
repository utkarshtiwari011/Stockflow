services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stockflow
      POSTGRES_PASSWORD: stockflow123
      POSTGRES_DB: stockflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://stockflow:stockflow123@db:5432/stockflow
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://frontend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
